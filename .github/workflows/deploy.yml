name: Deploy Backend to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            export PATH=/usr/bin:/bin:/usr/local/bin:/usr/local/sbin:$PATH
            echo "🔍 Finding all backend directories..."
            BACKEND_DIRS=$(find /root /home /var/www -type d -name "backend" -o -name "genvest-backend" 2>/dev/null | grep -E "backend|genz-trading-app" || true)
            
            for dir in $BACKEND_DIRS; do
              if [ -d "$dir/.git" ]; then
                echo "🚀 Updating backend in $dir..."
                cd "$dir"
                git fetch --all
                git reset --hard origin/main
                npm install --production || true
                npx prisma generate || true
              fi
            done
            
            echo "🔄 Restarting PM2 processes..."
            pm2 restart all || pm2 start server.js --name genvest-backend
            pm2 save
            echo "✅ Backend deployed successfully!"
